<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Özel Kadınlar Günü Kutlaması</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ffd9ec,#ff7eb3);
  font-family:'Segoe UI',sans-serif;
  overflow:hidden;
  perspective:1500px;
}

/* Zarf */
.envelope{
  position:relative;
  width:300px;
  height:180px;
  cursor:pointer;
  transform-style:preserve-3d;
  transition:1s;
  transform-origin:center bottom;
}
.base{
  position:absolute;
  width:100%;
  height:100%;
  background:#ff4fa3;
  border-radius:14px;
  box-shadow:0 25px 35px rgba(0,0,0,0.4);
}
.flap{
  position:absolute;
  width:0;
  height:0;
  border-left:150px solid transparent;
  border-right:150px solid transparent;
  border-bottom:110px solid #ff2e92;
  top:-110px;
  transform-origin:bottom;
  transition:1s;
}
.letter{
  position:absolute;
  width:260px;
  height:160px;
  background:white;
  left:20px;
  top:10px;
  border-radius:12px;
  padding:20px;
  box-shadow:0 15px 30px rgba(0,0,0,0.3);
  text-align:center;
  transform:translateY(0) rotateX(0deg);
  opacity:0;
  transition:1s;
}
.open .flap{
  transform:rotateX(180deg);
}
.open .letter{
  transform:translateY(-180px) rotateX(10deg);
  opacity:1;
  transition:1.2s ease-out;
}
h2{
  color:#ff2a8b;
  margin-top:5px;
  text-shadow:1px 1px 2px #ffb6d9;
}
p{
  font-size:16px;
  color:#444;
}

/* Kalpler ve kelebekler */
.heart, .butterfly{
  position:absolute;
  font-size:24px;
  animation:rise linear forwards;
  opacity:0.9;
}
@keyframes rise{
  0%{transform:translateY(0) rotate(0deg) scale(0.8);opacity:1;}
  25%{transform:rotate(15deg);}
  50%{transform:rotate(-15deg);}
  75%{transform:rotate(10deg);}
  100%{transform:translateY(-750px) rotate(360deg) scale(1.5);opacity:0;}
}
</style>
</head>
<body>

<div class="envelope" id="envelope">
  <div class="flap"></div>
  <div class="base"></div>
  <div class="letter" id="letter">
    <h2>💖 Senin İçin Özel 💖</h2>
    <p>Hayata sevgi, mutluluk ve ilham katan kişi sensin! Kadınlar Günü kutlu olsun 🌸🦋</p>
  </div>
</div>

<!-- Müzik -->
<audio id="music" src="https://www.bensound.com/bensound-music/bensound-happyrock.mp3"></audio>

<script>
const envelope = document.getElementById("envelope");
const music = document.getElementById("music");

envelope.onclick = () => {
  envelope.classList.add("open");
  createHeartsAndButterflies();
  music.play();
}

function createHeartsAndButterflies(){
  // Kalpler
  for(let i=0;i<35;i++){
    let heart = document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*window.innerWidth+"px";
    heart.style.bottom="0";
    heart.style.fontSize=(18+Math.random()*25)+"px";
    heart.style.animationDuration=(5+Math.random()*3)+"s";
    heart.style.animationTimingFunction="cubic-bezier(0.25, 0.1, 0.25, 1)";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),8000);
  }
  // Kelebekler
  for(let i=0;i<25;i++){
    let butterfly = document.createElement("div");
    butterfly.className="butterfly";
    butterfly.innerHTML="🦋";
    butterfly.style.left=Math.random()*window.innerWidth+"px";
    butterfly.style.bottom="0";
    butterfly.style.fontSize=(22+Math.random()*28)+"px";
    butterfly.style.animationDuration=(6+Math.random()*4)+"s";
    butterfly.style.animationTimingFunction="cubic-bezier(0.25, 0.1, 0.25, 1)";
    document.body.appendChild(butterfly);
    setTimeout(()=>butterfly.remove(),9000);
  }
}
</script>

</body>
</html>
