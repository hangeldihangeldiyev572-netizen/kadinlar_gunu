<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8 Mart Dünya Kadınlar Günü</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ffdde1,#f5a9c1);
  font-family:'Segoe UI',sans-serif;
  overflow:hidden;
  perspective:1200px;
}

/* Zarf */
.envelope{
  position:relative;
  width:280px;
  height:180px;
  cursor:pointer;
  transform-style:preserve-3d;
  transition:1s;
}
.base{
  position:absolute;
  width:100%;
  height:100%;
  background:#ff4fa3;
  border-radius:14px;
  box-shadow:0 20px 35px rgba(0,0,0,0.3);
}
.flap{
  position:absolute;
  width:0;
  height:0;
  border-left:140px solid transparent;
  border-right:140px solid transparent;
  border-bottom:100px solid #ff2e92;
  top:-100px;
  transform-origin:bottom;
  transition:1s;
}
.letter{
  position:absolute;
  width:240px;
  height:160px;
  background:white;
  left:20px;
  top:10px;
  border-radius:12px;
  padding:20px;
  box-shadow:0 15px 25px rgba(0,0,0,0.25);
  text-align:center;
  transform:translateY(0);
  opacity:0;
  transition:1s;
}
.open .flap{
  transform:rotateX(180deg);
}
.open .letter{
  transform:translateY(-160px);
  opacity:1;
}
h2{
  color:#ff2a8b;
  margin-top:5px;
}
p{
  font-size:16px;
  color:#444;
}

/* Kalpler ve kelebekler */
.heart, .butterfly{
  position:absolute;
  font-size:24px;
  animation:rise linear forwards;
}
@keyframes rise{
  0%{transform:translateY(0) scale(0.8);opacity:1}
  100%{transform:translateY(-700px) scale(1.5);opacity:0}
}
</style>
</head>
<body>

<div class="envelope" id="envelope">
  <div class="flap"></div>
  <div class="base"></div>
  <div class="letter">
    <h2>🌸 8 Mart Dünya Kadınlar Günü 🌸</h2>
    <p>Hayata sevgi, güç ve ilham katan tüm kadınların Kadınlar Günü kutlu olsun 💖</p>
  </div>
</div>

<script>
const envelope = document.getElementById("envelope");

envelope.onclick = () => {
  envelope.classList.add("open");
  createHeartsAndButterflies();
}

function createHeartsAndButterflies(){
  for(let i=0;i<30;i++){
    let heart = document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*window.innerWidth+"px";
    heart.style.bottom="0";
    heart.style.fontSize=(18+Math.random()*20)+"px";
    heart.style.animationDuration=(4+Math.random()*3)+"s";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),7000);
  }
  for(let i=0;i<20;i++){
    let butterfly = document.createElement("div");
    butterfly.className="butterfly";
    butterfly.innerHTML="🦋";
    butterfly.style.left=Math.random()*window.innerWidth+"px";
    butterfly.style.bottom="0";
    butterfly.style.fontSize=(20+Math.random()*25)+"px";
    butterfly.style.animationDuration=(5+Math.random()*4)+"s";
    document.body.appendChild(butterfly);
    setTimeout(()=>butterfly.remove(),8000);
  }
}
</script>

</body>
</html>
