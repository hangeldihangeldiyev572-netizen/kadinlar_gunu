<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8 Mart Dünya Kadınlar Günü</title>
<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff7eb3,#ffb6d9,#ffd9ec);
font-family:'Segoe UI',sans-serif;
overflow:hidden;
perspective:1200px;
}
.envelope{
position:relative;
width:260px;
height:170px;
cursor:pointer;
transform-style:preserve-3d;
transition:1s;
}
.base{
position:absolute;
width:100%;
height:100%;
background:#ff4fa3;
border-radius:12px;
box-shadow:0 25px 45px rgba(0,0,0,0.3);
}
.flap{
position:absolute;
width:0;
height:0;
border-left:130px solid transparent;
border-right:130px solid transparent;
border-bottom:90px solid #ff2e92;
top:-90px;
transform-origin:bottom;
transition:1s;
}
.letter{
position:absolute;
width:230px;
height:150px;
background:white;
left:15px;
top:10px;
border-radius:10px;
padding:18px;
box-shadow:0 15px 25px rgba(0,0,0,0.25);
text-align:center;
transform:translateY(0);
opacity:0;
transition:1s;
}
.open .flap{
transform:rotateX(180deg);
}
.open .letter{
transform:translateY(-140px);
opacity:1;
}
h2{
color:#ff2a8b;
margin-top:5px;
}
p{
font-size:14px;
color:#444;
}
.heart{
position:absolute;
font-size:22px;
animation:rise linear forwards;
}
@keyframes rise{
0%{transform:translateY(0) scale(0.8);opacity:1}
100%{transform:translateY(-700px) scale(1.4);opacity:0}
}
.petal{
position:absolute;
font-size:20px;
animation:fall linear forwards;
}
@keyframes fall{
0%{transform:translateY(-50px) rotate(0deg)}
100%{transform:translateY(110vh) rotate(360deg)}
}
.sparkle{
position:absolute;
width:6px;
height:6px;
background:white;
border-radius:50%;
opacity:0.8;
animation:spark 4s linear infinite;
}
@keyframes spark{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-100vh);opacity:0}
}
</style>
</head>
<body>
<div class="envelope" id="envelope">
<div class="flap"></div>
<div class="base"></div>
<div class="letter">
<h2>🌸 8 Mart Dünya Kadınlar Günü 🌸</h2>
<p>
Hayata sevgi, güç ve ilham katan tüm kadınların  
Kadınlar Günü kutlu olsun 💖
</p>
</div>
</div>
<script>
const envelope=document.getElementById("envelope")
envelope.onclick=()=>{
envelope.classList.add("open")
createHearts()
createPetals()
}
function createHearts(){
for(let i=0;i<35;i++){
let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤️"
heart.style.left=Math.random()*window.innerWidth+"px"
heart.style.bottom="0"
heart.style.fontSize=(18+Math.random()*25)+"px"
heart.style.animationDuration=(3+Math.random()*3)+"s"
document.body.appendChild(heart)
setTimeout(()=>heart.remove(),6000)
}
}
function createPetals(){
for(let i=0;i<40;i++){
let p=document.createElement("div")
p.className="petal"
p.innerHTML="🌸"
p.style.left=Math.random()*window.innerWidth+"px"
p.style.top="-20px"
p.style.fontSize=(15+Math.random()*25)+"px"
p.style.animationDuration=(4+Math.random()*4)+"s"
document.body.appendChild(p)
setTimeout(()=>p.remove(),8000)
}
}
for(let i=0;i<30;i++){
let s=document.createElement("div")
s.className="sparkle"
s.style.left=Math.random()*100+"%"
s.style.top=Math.random()*100+"%"
s.style.animationDuration=(3+Math.random()*6)+"s"
document.body.appendChild(s)
}
</script>
</body>
</html>
