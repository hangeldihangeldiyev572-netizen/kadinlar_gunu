<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Özel Kadınlar Günü Kutlaması</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ffd9ec,#ff7eb3);
  font-family:'Segoe UI',sans-serif;
  overflow:hidden;
}

/* Büyük kalp */
#bigHeart{
  font-size:120px;
  color:#ff2e92;
  cursor:pointer;
  transition: transform 0.5s ease;
  user-select:none;
}

/* Küçük uçan kalpler */
.smallHeart{
  position:absolute;
  font-size:20px;
  color:#ff4fa3;
  animation:rise linear forwards;
  opacity:0.9;
}

/* Uçma animasyonu */
@keyframes rise{
  0%{transform:translateY(0) scale(0.5);opacity:1;}
  25%{transform:rotate(15deg);}
  50%{transform:rotate(-15deg);}
  75%{transform:rotate(10deg);}
  100%{transform:translateY(-600px) rotate(360deg) scale(1.2);opacity:0;}
}

/* Kutlama mesajı */
#message{
  position:absolute;
  top:40%;
  text-align:center;
  font-size:24px;
  color:#ff2a8b;
  opacity:0;
  transition: opacity 1s ease;
  text-shadow:1px 1px 2px #fff;
}
</style>
</head>
<body>

<!-- Büyük kalp -->
<div id="bigHeart">💖</div>
<!-- Mesaj -->
<div id="message">Hayata sevgi ve mutluluk katan kişi sensin! Kadınlar Günü kutlu olsun 🌸🦋</div>

<!-- Müzik -->
<audio id="music" src="https://www.bensound.com/bensound-music/bensound-happyrock.mp3"></audio>

<script>
const bigHeart = document.getElementById("bigHeart");
const message = document.getElementById("message");
const music = document.getElementById("music");

bigHeart.onclick = () => {
  // Kalbi küçültüp animasyon başlat
  bigHeart.style.transform = "scale(0.3)";
  createFlyingHearts();
  // Mesajı göster
  message.style.opacity = 1;
  // Müzik çal
  music.play();
}

// Küçük kalpler oluştur
function createFlyingHearts(){
  for(let i=0;i<40;i++){
    let heart = document.createElement("div");
    heart.className="smallHeart";
    heart.innerHTML="❤️";
    heart.style.left = (window.innerWidth/2 - 15) + Math.random()*60 - 30 + "px";
    heart.style.bottom = (window.innerHeight/2 - 15) + Math.random()*60 - 30 + "px";
    heart.style.fontSize = (14 + Math.random()*20) + "px";
    heart.style.animationDuration = (4 + Math.random()*3) + "s";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),8000);
  }
}
</script>

</body>
</html>
